<div class="auth-container">
    <section class="form-section">
        <h2>REGISTRARSE</h2>
        <form id="form-registro">
            <div class="input-group">
                <label for="reg-correo">CORREO ELECTRÓNICO</label>
                <input type="email" id="reg-correo" class="auth-input" required placeholder="ejemplo@mail.com">

                <label for="reg-dni">DNI</label>
                <input type="text" id="reg-dni" class="auth-input" required pattern="[0-9]{8}[A-Z,a-z]{1}" title="8 números y una letra">

                <label for="reg-usuario">USUARIO</label>
                <input type="text" id="reg-usuario" class="auth-input" required minlength="4">

                <label for="reg-pass">CONTRASEÑA</label>
                <input type="password" id="reg-pass" class="auth-input" required minlength="6">
            </div>
            <button type="submit" class="btn-iniciar">REGISTRARME</button>
        </form>
    </section>

    <div class="auth-divider"></div>

    <section class="form-section">
        <h2>INICIAR SESIÓN</h2>
        <form id="form-login">
            <div class="input-group">
                <label for="log-usuario">USUARIO</label>
                <input type="text" id="log-usuario" class="auth-input" required>

                <label for="log-pass">CONTRASEÑA</label>
                <input type="password" id="log-pass" class="auth-input" required>
            </div>
            <button type="submit" class="btn-iniciar">INICIAR SESIÓN</button>
        </form>
    </section>
</div>
