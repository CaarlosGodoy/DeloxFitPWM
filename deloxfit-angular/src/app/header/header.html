<header class="main-header">
  <div class="logo-box">
    <a routerLink="/">
      <img src="assets/logo.png" alt="DeloxFit Logo" class="logoDF">
    </a>
  </div>

  <nav class="header-nav">
    <ul class="header-btns-row" [ngClass]="{'active': menuActive()}">
      <li><a routerLink="/" fragment="about-us-section" class="btn-header" (click)="menuActive.set(false)">CONOCENOS</a></li>
      <li><a routerLink="/" fragment="facilities-section" class="btn-header" (click)="menuActive.set(false)">INSTALACIONES</a></li>
      <li><a routerLink="/clases" class="btn-header" (click)="menuActive.set(false)">CLASES</a></li>
      <li><a routerLink="/suscripciones" class="btn-header" (click)="menuActive.set(false)">SUSCRIPCIONES</a></li>
      
      @if (authService.currentUser()) {
        <li><a routerLink="/mi-cuenta" class="btn-header" (click)="menuActive.set(false)">MI CUENTA</a></li>
      } @else {
        <li><a routerLink="/login" class="btn-header" (click)="menuActive.set(false)">INSCRIBIRSE</a></li>
      }
    </ul>
  </nav>

  <div class="menu-toggle" id="menu-toggle" (click)="toggleMenu()">☰</div>
</header>
