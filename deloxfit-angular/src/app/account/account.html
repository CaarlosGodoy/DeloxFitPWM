<section class="account-section">
  <h2 class="section-title">MI CUENTA</h2>

  @if (authService.currentUser(); as user) {
    <div class="form-container">
      <form class="account-form">
        <div class="account-column">
          <label class="account-label">USUARIO</label>
          <input type="text" class="account-input" readonly [value]="user.nombre || user.usuario">

          <label class="account-label">CORREO</label>
          <input type="email" class="account-input" readonly [value]="user.email">

          <label class="account-label">DNI</label>
          <input type="text" class="account-input" readonly [value]="user.dni">

          <label class="account-label">SUB. ACTIVA</label>
          <input type="text" class="account-input" readonly [value]="user.suscripcion || 'Ninguna activa'">
          <button type="button" class="btn-cancel" (click)="cancelSubscription()">CANCELAR SUB</button>
        </div>

        <div class="account-divider"></div>

        <div class="account-column">
          <div id="reserva-container">
            <label class="account-label">MIS RESERVAS</label>

            @if (user.reservas && user.reservas.length > 0) {
              <select id="reserva-selector" class="account-input" [ngModel]="selectedReservaName()" (ngModelChange)="selectedReservaName.set($event); openCancelReservation($event)" name="reserva">
                <option value="" disabled selected>Selecciona una reserva</option>
                @for (reserva of user.reservas; track $index) {
                  <option [value]="reserva">{{ reserva }}</option>
                }
              </select>
              <button type="button" class="btn-cancel" [disabled]="!selectedReservaName()" (click)="cancelReservation()">CANCELAR SELECCIONADA</button>
            } @else {
              <input type="text" class="account-input" readonly value="Ninguna activa">
            }
          </div>

          <div class="button-group">
            <button type="button" class="btn-sign_out" (click)="logout()">CERRAR SESIÓN</button>
          </div>
        </div>
      </form>
    </div>
  } @else {
    <div class="form-container">
      <p style="text-align: center; color: white;">Verificando sesión... Si no has iniciado sesión, por favor hazlo.</p>
    </div>
  }
</section>
