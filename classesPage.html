<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="./js/fetching.js"></script>
        <link rel="stylesheet" href="./css/classesPage.css">
        <link rel="stylesheet" href="./css/footer.css">
        <link rel="stylesheet" href="./css/header.css">
        <title>DeloxFit - Clases</title>
    </head>

    <body>
        <header data-xlu-include-file="./templates/header.html"></header>

        <main id="classes-content">
            <section id="classes-calendar-section" class="classes-calendar-section">
                <h2 class="section-title">HORARIOS DE CLASES</h2>
                <div class="table-container">
                    <table class="classesCalendar">
                        <thead>
                        <tr>
                            <th>Hora</th>
                            <th>Lunes</th>
                            <th>Martes</th>
                            <th>Miércoles</th>
                            <th>Jueves</th>
                            <th>Viernes</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td class="time-col">09:00</td>
                            <td class="class-cell" onclick="openClassInfo('Spinning')">Spinning</td>
                            <td class="class-cell" onclick="openClassInfo('Zumba')">Zumba</td>
                            <td class="class-cell" onclick="openClassInfo('Spinning')">Spinning</td>
                            <td class="class-cell" onclick="openClassInfo('Zumba')">Zumba</td>
                            <td class="class-cell" onclick="openClassInfo('Boxeo')">Boxeo</td>
                        </tr>
                        <tr>
                            <td class="time-col">10:00</td>
                            <td class="class-cell" onclick="openClassInfo('Boxeo')">Boxeo</td>
                            <td class="class-cell" onclick="openClassInfo('Spinning')">Spinning</td>
                            <td class="class-cell" onclick="openClassInfo('Boxeo')">Boxeo</td>
                            <td class="class-cell" onclick="openClassInfo('Spinning')">Spinning</td>
                            <td class="class-cell" onclick="openClassInfo('Zumba')">Zumba</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <footer data-xlu-include-file="./templates/footer.html"></footer>
    </body>
</html>
